name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kalles-finance
      uses: actions/checkout@v4
      with:
        path: kalles-buss/kalles-finance

    - name: Checkout kalles-traffic (for pubsub client)
      uses: actions/checkout@v4
      with:
        repository: fmanh3/kalles-traffic
        path: kalles-buss/kalles-traffic

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'

    - name: Install Traffic dependencies
      run: npm install --legacy-peer-deps
      working-directory: kalles-buss/kalles-traffic

    - name: Install Finance dependencies
      run: npm install --legacy-peer-deps
      working-directory: kalles-buss/kalles-finance

    - name: Build TypeScript
      run: npm run build
      working-directory: kalles-buss/kalles-finance

    # Kalles Finance har inga riktiga tester än, så vi kommenterar ut npm test för att inte faila bygget
    # - name: Run tests
    #   run: npm test
